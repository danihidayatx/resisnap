<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResiSnap - Shopee Thermal Printer Tool</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Browser Support Warning -->
        <div id="browser-warning" class="warning-banner" hidden>
            ResiSnap works best on Chrome or Edge. Your current browser might not support direct printing (WebUSB).
        </div>

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo">
                <i data-lucide="printer"></i>
                <span>ResiSnap</span>
            </div>
            <div class="actions">
                <div class="status-indicator">
                    <span id="printer-status-dot" class="dot"></span>
                    <span id="printer-status-text">Printer Disconnected</span>
                </div>
                <div class="paper-width-selector">
                    <span class="paper-width-label">Lebar:</span>
                    <label class="paper-radio">
                        <input type="radio" name="paper-width" value="58" checked> 58mm
                    </label>
                    <label class="paper-radio">
                        <input type="radio" name="paper-width" value="80"> 80mm
                    </label>
                    <label class="paper-radio">
                        <input type="radio" name="paper-width" value="100"> 100mm
                    </label>
                </div>
                <button id="connect-printer" class="btn btn-outline">
                    <i data-lucide="usb"></i>
                    <span class="btn-text">Connect Printer</span>
                </button>
                <label for="file-upload" class="btn btn-primary">
                    <i data-lucide="file-up"></i>
                    <span class="btn-text">Upload PDF</span>
                    <input type="file" id="file-upload" accept="application/pdf" hidden>
                </label>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Large Preview -->
            <div class="preview-container">
                <!-- Live Barcode Preview (above receipt) -->
                <div id="live-barcode-preview" class="live-barcode-preview" hidden>
                    <div class="live-barcode-header">
                        <div class="live-barcode-label">
                            <i data-lucide="check-circle" style="width: 14px; height: 14px; color: #4caf50;"></i>
                            Barcode Digital: <span id="live-barcode-text"></span>
                        </div>
                        <div class="live-barcode-controls">
                            <label class="toggle-label compact">
                                <input type="checkbox" id="replace-barcode-toggle" checked>
                                <span class="toggle-text">Regenerate</span>
                            </label>
                            <label class="toggle-label compact">
                                <input type="checkbox" id="erase-original-toggle">
                                <span class="toggle-text">Hapus Asli</span>
                            </label>
                        </div>
                    </div>
                    <canvas id="live-barcode-canvas"></canvas>
                    <div class="live-barcode-edit">
                        <input type="text" id="barcode-value-input" placeholder="No barcode detected">
                    </div>
                </div>

                <!-- Receipt Canvas -->
                <div id="canvas-wrapper" class="preview-canvas-wrapper">
                    <!-- Canvas will be inserted here -->
                    <div id="drop-zone" class="drop-zone">
                        <i data-lucide="file-text" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                        <p>Upload a Shopee PDF to get started</p>
                    </div>
                </div>
            </div>

            <!-- Page Selection Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    Pages (<span id="page-count">0</span>)
                </div>
                <div id="thumbnail-strip" class="thumbnail-strip">
                    <!-- Thumbnails will be inserted here -->
                </div>
            </aside>
        </main>

        <!-- Control Panel -->
        <section class="control-panel">
            <div class="control-group">
                <button id="rotate-btn" class="btn btn-outline btn-icon" title="Rotate 90° Clockwise">
                    <i data-lucide="rotate-cw"></i>
                </button>
                <button id="settings-toggle" class="btn btn-outline" title="Show/Hide Advanced Settings">
                    <i data-lucide="settings-2"></i>
                    <span class="btn-text">Settings</span>
                    <i id="settings-chevron" data-lucide="chevron-up"></i>
                </button>
            </div>

            <div id="advanced-controls" class="advanced-controls-wrapper" hidden>
                <div class="control-group">
                    <div class="toggle-group">
                        <label class="toggle-label">
                            <input type="checkbox" id="grayscale-toggle" checked>
                            <span class="toggle-text">B&W</span>
                        </label>
                    </div>
                    <div class="slider-group">
                        <label>Brightness <span id="brightness-val">0</span></label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Contrast <span id="contrast-val">0</span></label>
                        <input type="range" id="contrast" min="-100" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Text Threshold <span id="threshold-val">175</span></label>
                        <input type="range" id="threshold" min="64" max="220" value="175">
                    </div>
                    <div class="slider-group">
                        <label>Barcode Threshold <span id="barcode-threshold-val">200</span></label>
                        <input type="range" id="barcode-threshold" min="128" max="250" value="200" title="Adjust if barcode is too thin or too thick">
                    </div>
                    <div class="slider-group">
                        <label>Barcode Thinning <span id="barcode-erode-val">1</span></label>
                        <input type="range" id="barcode-erode" min="0" max="3" value="1" title="0 = No thinning, 1 = Normal, 2+ = Extreme">
                    </div>
                </div>
            </div>

            <div class="control-group actions-right">
                <button id="download-pdf" class="btn btn-outline" disabled>
                    <i data-lucide="download"></i>
                    <span class="btn-text">Download PDF</span>
                </button>
                <button id="print-current" class="btn btn-outline" disabled>
                    <i data-lucide="printer"></i>
                    <span class="btn-text-mobile">Print</span>
                </button>
                <button id="print-all" class="btn btn-primary" disabled>
                    <i data-lucide="printer"></i>
                    <span class="btn-text-mobile">Print All</span>
                </button>
            </div>
        </section>
    </div>

    <!-- Hidden barcode preview canvas (for sidebar, kept for JS compatibility) -->
    <canvas id="barcode-preview-canvas" style="display: none;"></canvas>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
